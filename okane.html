<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <!--タイトル-->
    <title>
        夏旅行
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            padding-top: 70px; 
        }
    </style>
</head>
<body>
    <header>
    <nav class="navbar navbar-expand-lg navbar-light bg-light fixed-top">
    <div class="container-fluid">
        <div style="width: 40px;">
            <a href="index.html" class="text-dark">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="bi bi-chevron-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M11.354 1.646a.5.5 0 0 1 0 .708L5.707 8l5.647 5.646a.5.5 0 0 1-.708.708l-6-6a.5.5 0 0 1 0-.708l6-6a.5.5 0 0 1 .708 0z"/>
                </svg>
            </a>
        </div>

        <span class="navbar-brand m-0">お金</span>

        <div style="width: 40px;"></div>
    </div>
    </nav>
    </header>
    <main class="container mt-3 px-4 px-md-5">
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <!--金額-->
            <iframe 
                src="https://plsk.net/zenmashi3?rm=minimal" 
                style="width: 100%; height: 400px; border: none; display: block;">
            </iframe>
        </div>
    </div>
        <!--詳細画像-->
        <p>
            ホテル
            <img src="hotelokane.jpg" class="img-fluid" alt="ホテルお金">
        </p>
        <p>
            移動代
            <img src="idou.jpg" class="img-fluid" alt="新幹線">
        </p>
        <p>
            チケット
            <img src="ticket.jpg" class="img-fluid" alt="チケット">
            <!--チケットURL-->
            <a class="nav-link text-primary text-decoration-underline" href="https://t.pia.jp/" target="_blank" rel="noopener noreferrer">チケットぴあ</a>
        </p>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    window.addEventListener('load', () => {
        const header = document.querySelector('.navbar');
        const setPadding = () => {
            document.body.style.paddingTop = header.offsetHeight + 'px';
        };
        setPadding();
        window.addEventListener('resize', setPadding);
        });
    </script>
</body>
</html>
